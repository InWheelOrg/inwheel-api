name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  workflow_dispatch:

jobs:
  claude-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@567fe954a4527e81f132d87d1bdbcc94f7737434 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Read CLAUDE.md first, then review this pull request.

            Post inline comments ONLY for issues that must be fixed before merging:
            - Bugs or logic errors
            - Security vulnerabilities (injection, auth bypass, secret exposure, etc.)
            - Incorrect HTTP semantics (wrong status codes, missing required headers)
            - Direct violations of the patterns documented in CLAUDE.md

            Do NOT comment on:
            - Code style or formatting — golangci-lint already enforces this in CI
            - Subjective preferences or minor readability suggestions
            - Hypothetical future concerns without concrete evidence
            - Missing tests for code paths that are already covered or cannot fail
            - Documentation, unless CLAUDE.md explicitly requires it for this case

            After reviewing, post a single top-level summary comment:
            - If must-fix issues were found: list them briefly
            - If no must-fix issues were found: explicitly state the PR looks good

            Do not manufacture issues to appear thorough.
          claude_args: |
            --max-turns 20
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Grep,Glob"
